name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Formatting & Linting (Biome)
        run: npx biome check .

      - name: Type Check
        run: npx tsc --noEmit -p apps/web/tsconfig.json

      - name: Build Next.js
        env:
          CLERK_SECRET_KEY: sk_test_bW9jay1jbGVyay1zZWNyZXQ=
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Z3Jvd24tcGFycm90LTc3LmNsZXJrLmFjY291bnRzLmRldiQ
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
        run: npm run build
