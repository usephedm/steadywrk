<!DOCTYPE html><html><head><meta charset="utf-8"><title>Fleet Dashboard</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0A0A0A;color:#E8E8E8;font-family:system-ui}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px;max-width:1200px;margin:0 auto}
h1{text-align:center;padding:16px;color:#E58A0F}
.card{background:#1A1A1A;border:1px solid #333;border-radius:8px;padding:16px}
.card h3{color:#E58A0F;margin-bottom:8px}.ok{color:#0F6B6F}.down{color:#E53E3E}
.label{color:#888;font-size:12px}.val{font-size:14px;margin-bottom:4px}
</style></head><body>
<h1>STEADYWRK Fleet</h1><div class="grid" id="grid"></div>
<script>
const agents=[{name:"HAWKEYE",port:8001,node:"K1",ip:"100.76.108.124"},{name:"SCRIBE",port:8002,node:"K1",ip:"100.76.108.124"},{name:"SENTINEL",port:8003,node:"K1",ip:"100.76.108.124"},{name:"DISPATCH",port:8004,node:"K1",ip:"100.76.108.124"},{name:"FORGE",port:8001,node:"K2",ip:"100.86.148.31"},{name:"NEXUS",port:8002,node:"K2",ip:"100.86.148.31"},{name:"ORACLE",port:8003,node:"K2",ip:"100.86.148.31"},{name:"PHANTOM",port:8004,node:"K2",ip:"100.86.148.31"}];
async function refresh(){const g=document.getElementById("grid");g.innerHTML="";for(const a of agents){const c=document.createElement("div");c.className="card";
try{const r=await fetch(`http://${a.ip}:${a.port}/health`,{signal:AbortSignal.timeout(3000)});const d=await r.json();
c.innerHTML=`<h3>${a.name} (${a.node})</h3><div class="val ok">ONLINE</div><div class="label">Uptime</div><div class="val">${d.process?.uptimeSeconds||0}s</div><div class="label">Requests</div><div class="val">${d.heartbeat?.requestCount||0}</div>`;
}catch{c.innerHTML=`<h3>${a.name} (${a.node})</h3><div class="val down">OFFLINE</div>`;}g.appendChild(c);}}
refresh();setInterval(refresh,10000);
</script></body></html>
